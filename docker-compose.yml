services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: covenants
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"

  api:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - anvil
    ports:
      - "8000:8000"

volumes:
  postgres_data:
